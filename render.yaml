services:
  - type: web_service
    name: smartauto-reply-backend
    env: node
    plan: free
    branch: main
    root: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FRONTEND_URL
        value: https://smartauto-reply-frontend.onrender.com

staticSites:
  - type: static_site
    name: smartauto-reply-frontend
    branch: main
    root: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://smartauto-reply-backend.onrender.com/api
